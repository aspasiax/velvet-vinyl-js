<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Vinyl</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <header>
        <h1>
            <i class="fa-solid fa-record-vinyl"></i>
            Velvet Vinyl
        </h1>
        <p id="song-counter">Your playlist is empty.</p>
    </header>

    <main>

        <section class="search-section">
            <input
                type="text"
                id="search-input"
                placeholder="Search songs..."
            >
        </section>

        <section class="form-section">

            <h2>Add New Song</h2>

            <form id="song-form">

                <input
                    type="text"
                    id="title"
                    placeholder="Song Title"
                >

                <input
                    type="text"
                    id="artist"
                    placeholder="Artist"
                >

                <select id="genre">
                    <option value="">Select Genre</option>
                    <option value="Pop">Pop</option>
                    <option value="Rock">Rock</option>
                    <option value="Alternative">Alternative</option>
                    <option value="Indie">Indie</option>
                    <option value="Hip-Hop">Hip-Hop</option>
                    <option value="R&B">R&B</option>
                    <option value="Electronic">Electronic</option>
                    <option value="Jazz">Jazz</option>
                    <option value="Classical">Classical</option>
                    <option value="Other">Other</option>
                </select>

                <p id="form-error" class="form-error"></p>

                <button type="submit">
                    Add Song
                </button>

                <button
                    type="button"
                    id="cancel-edit-btn"
                    class="cancel-btn"
                    hidden>
                    Cancel
                </button>
            </form>

        </section>

        <section class="stats-section">

            <div class="stat-card">
                <h3 id="total-songs">0</h3>
                <p>Total Songs</p>
            </div>

            <div class="stat-card">
                <h3 id="favorite-songs">0</h3>
                <p>Favorites</p>
            </div>

            <div class="stat-card">
                <h3 id="popular-genre">-</h3>
                <p>Top Genre</p>
            </div>

        </section>

        <section class="playlist-section">

            <h2>Your Playlist</h2>

            <div class="playlist-controls">
                <select id="genre-filter">
                    <option value="All">All Genres</option>
                    <option value="Pop">Pop</option>
                    <option value="Rock">Rock</option>
                    <option value="Alternative">Alternative</option>
                    <option value="Indie">Indie</option>
                    <option value="Hip-Hop">Hip-Hop</option>
                    <option value="R&B">R&B</option>
                    <option value="Electronic">Electronic</option>
                    <option value="Jazz">Jazz</option>
                    <option value="Classical">Classical</option>
                    <option value="Other">Other</option>
                </select>

                <select id="favorite-filter">
                    <option value="all">All Songs</option>
                    <option value="favorites">Favorites Only</option>
                </select>

                <select id="sort-filter">
                    <option value="az">A-Z</option>
                    <option value="za">Z-A</option>
                </select>

                <button id="clear-playlist-btn" class="clear-btn">
                    Clear Playlist
                </button>
            </div>

            <div id="playlist-container">

                <!-- Song cards will appear here -->

            </div>

        </section>

    </main>

    <div id="confirmation-modal" class="modal-overlay hidden">

        <div class="modal">

            <h2 id="modal-title">Delete Song</h2>

            <p id="modal-message">
                Are you sure you want to delete this song?
            </p>

            <div class="modal-actions">
                <button id="modal-cancel-btn" class="modal-cancel-btn">
                    Cancel
                </button>

                <button id="modal-confirm-btn" class="modal-confirm-btn">
                    Delete
                </button>
            </div>

        </div>

    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="./js/app.js"></script>

</body>
</html>
