<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Vinyl</title>

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <header>
        <h1>Velvet Vinyl</h1>
        <p>Your personal music collection, all in one place.</p>
    </header>

    <main>

        <section class="search-section">
            <input
                type="text"
                id="search-input"
                placeholder="Search songs..."
            >
        </section>

        <section class="form-section">

            <h2>Add New Song</h2>

            <form id="song-form">

                <input
                    type="text"
                    id="title"
                    placeholder="Song Title"
                >

                <input
                    type="text"
                    id="artist"
                    placeholder="Artist"
                >

                <input
                    type="text"
                    id="genre"
                    placeholder="Genre"
                >

                <button type="submit">
                    Add Song
                </button>

            </form>

        </section>

        <section class="playlist-section">

            <h2>Your Playlist</h2>

            <div id="playlist-container">

                <!-- Song cards will appear here -->

            </div>

        </section>

    </main>

    <script src="./js/app.js"></script>

</body>
</html>
